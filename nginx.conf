# Node Service Console — Nginx 配置
# Debian/Ubuntu: 放置到 /etc/nginx/sites-available/node-service-console
# RHEL/CentOS/OpenCloudOS: 放置到 /etc/nginx/conf.d/node-service-console.conf

# WebSocket Connection 升级映射（需放在 http 块内，server 块外）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 限流定义（需放在 http 块内，server 块外）
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name www.duidui-island.com duidui-island.com;

    # Let's Encrypt 验证路径（申请证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # 其余请求全部跳转 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl;
    http2 on;
    server_name www.duidui-island.com duidui-island.com;

    # SSL 证书路径（certbot 自动生成）
    ssl_certificate     /etc/letsencrypt/live/www.duidui-island.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.duidui-island.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 请求体大小限制（按需调整，如有大文件上传可改大）
    client_max_body_size 50m;

    # 限流（每个 IP 每秒 20 个请求，突发允许 40）
    limit_req zone=general burst=40 nodelay;

    # 代理超时
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # SSE 支持：不在此全局关闭 proxy_buffering（会导致大静态文件在 HTTP/2 下 ERR_HTTP2_PROTOCOL_ERROR）
    # 由后端 SSE 端点在响应头中添加 `X-Accel-Buffering: no`，nginx 会自动禁用该请求的缓冲
    proxy_buffering on;
    proxy_buffer_size        16k;
    proxy_buffers            8 64k;
    proxy_busy_buffers_size  128k;

    # WebTerminal — 长连接 WebSocket，单独配置超时
    location /terminal/ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 必须
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 终端长连接：1 小时无数据才断开
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_buffering       off;
        proxy_cache           off;
    }

    # 所有请求转发到 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSE 支持
        proxy_cache off;
    }

    # 访问日志
    access_log /var/log/nginx/node-service-console.access.log;
    error_log  /var/log/nginx/node-service-console.error.log;
}
